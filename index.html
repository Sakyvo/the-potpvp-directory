<!DOCTYPE html>
<html lang="zh-CN">
<head>

</head>
<body>

<!-- Maintenance Overlay -->
<div class="maint-overlay" id="maint-overlay" style="display:none;">
  <div class="maint-card">
    <h1 class="maint-title">DOC IN MAINTENANCE</h1>
    <p class="maint-sub">填坑中别急</p>
  </div>
</div>

<header class="topbar" id="topbar">
  <button class="topbar-btn" id="menu-btn" aria-label="目录">
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
    </svg>
  </button>
  <div class="topbar-title">pdir.cc.cd</div>
  <div class="topbar-right">
    <span class="maint-badge" id="maint-badge" hidden>维护中</span>
    <button class="mode-toggle" id="mode-toggle" type="button" aria-label="切换视图模式">full</button>
    <button class="topbar-btn" id="search-btn" aria-label="搜索">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="9" r="5"/><line x1="13" y1="13" x2="17" y2="17"/>
      </svg>
    </button>
  </div>
</header>

<div class="search-panel" id="search-panel">
  <div class="search-inner">
    <input type="text" id="search-input" placeholder="搜索内容..." autocomplete="off">
    <span class="search-count" id="search-count"></span>
    <button class="search-nav-btn" id="search-prev" aria-label="上一个">&#8593;</button>
    <button class="search-nav-btn" id="search-next" aria-label="下一个">&#8595;</button>
    <button class="search-nav-btn" id="search-close" aria-label="关闭">&#10005;</button>
  </div>
  <div class="search-results" id="search-results" hidden></div>
</div>

<div class="sidebar-overlay" id="sidebar-overlay"></div>
<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span>目录</span>
    <div class="toc-depth-control" id="toc-depth-control" role="group" aria-label="目录层级">
      <button type="button" data-toc-depth="1" aria-label="显示一级目录">1</button>
      <button type="button" data-toc-depth="2" aria-label="显示二级目录">2</button>
      <button type="button" data-toc-depth="3" aria-label="显示三级目录">3</button>
    </div>
  </div>
  <label class="toc-track-control">
    <input type="checkbox" id="toc-track-toggle">
    <span>Track</span>
  </label>
  <ul class="toc" id="toc"></ul>
</nav>

<main class="content" id="content"></main>

<footer class="site-footer" id="site-footer" aria-hidden="true">
  <div class="site-footer-divider" aria-hidden="true">
    <span class="site-footer-divider-half site-footer-divider-red"></span>
    <span class="site-footer-divider-center"><span class="site-footer-divider-dot"></span></span>
    <span class="site-footer-divider-half site-footer-divider-blue"></span>
  </div>
  <div class="site-footer-main">
    <img class="site-footer-flag" src="assets/images/flag.png" alt="Flag">
    <span class="site-footer-text">
      <a class="site-footer-sakyvo" href="https://space.bilibili.com/1049515077" target="_blank" rel="noopener noreferrer">Sakyvo<img class="site-footer-arrow" src="assets/images/external-link.png" alt=""></a><span class="site-footer-project"> Present</span>
    </span>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>

<script src="js/app.js?v=43"></script>
