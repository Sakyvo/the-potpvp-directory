<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - The PotPvP Directory</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../css/admin.css">
<link rel="stylesheet" href="../css/main.css">
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h2>The PotPvP Directory</h2>
    <p>管理后台</p>
    <input type="password" id="token-input" placeholder="Codeberg Personal Access Token" autocomplete="off">
    <button id="login-btn">登录</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Simple Editor -->
<div class="editor-screen" id="editor-screen" style="display:none;">
  <header class="admin-topbar">
    <a href="../" class="back-link">&larr; 返回</a>
    <span class="admin-title">Admin</span>
    <div class="admin-actions">
      <div class="view-toggle" id="view-toggle">
        <button class="toggle-btn active" id="btn-rendered" data-view="rendered">预览</button>
        <button class="toggle-btn" id="btn-source" data-view="source">源码</button>
      </div>
      <span class="status-text" id="status-text"></span>
      <button class="btn-publish" id="publish-btn">发布</button>
    </div>
  </header>

  <div class="editor-main" id="editor-main">
    <!-- Source view (hidden by default) -->
    <textarea class="source-editor" id="source-editor" style="display:none;" spellcheck="false" placeholder="在此处粘贴石墨文档内容，或直接编辑 Markdown..."></textarea>
    <!-- Rendered preview (default) -->
    <div class="rendered-preview" id="rendered-preview" tabindex="0"></div>
  </div>

  <footer class="admin-footer">
    <span id="footer-status">就绪</span>
  </footer>
</div>

<!-- ═══ Hidden old editing UI (preserved, not removed) ═══ -->
<div style="display:none;" id="old-editor-ui">
  <nav class="editor-sidebar" id="editor-sidebar">
    <div class="sidebar-toggle-mobile" id="sidebar-toggle-mobile">目录 ▼</div>
    <ul class="file-tree" id="file-tree"></ul>
  </nav>
  <div id="vditor"></div>
  <div class="ctx-menu" id="ctx-menu"></div>
  <div class="modal-overlay" id="modal">
    <div class="modal-card">
      <div class="modal-title" id="modal-title"></div>
      <input type="text" id="modal-input" autocomplete="off">
      <div class="modal-actions">
        <button class="modal-btn" id="modal-cancel">取消</button>
        <button class="modal-btn modal-btn-primary" id="modal-confirm">确认</button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
<script src="../js/codeberg-api.js?v=2"></script>
<script src="../js/admin.js?v=2"></script>
</body>
</html>
