<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - The PotPvP Directory</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../css/main.css?v=13">
<link rel="stylesheet" href="../css/admin.css?v=11">
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h2>The PotPvP Directory</h2>
    <p>管理后台</p>
    <input type="password" id="token-input" placeholder="Codeberg Personal Access Token" autocomplete="off">
    <button id="login-btn">登录</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Editor -->
<div class="editor-screen" id="editor-screen" style="display:none;">
  <header class="admin-topbar">
    <button class="topbar-btn" id="admin-menu-btn" aria-label="目录">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>
    <span class="admin-title">Admin</span>
    <div class="admin-actions">
      <div class="view-toggle" id="view-toggle">
        <button class="toggle-btn active" id="btn-rendered" data-view="rendered">预览</button>
        <button class="toggle-btn" id="btn-source" data-view="source">源码</button>
      </div>
      <button class="undo-redo-btn" id="undo-btn" title="撤销 Ctrl+Z">&#x21B6;</button>
      <button class="undo-redo-btn" id="redo-btn" title="重做 Ctrl+Y">&#x21B7;</button>
      <span class="status-text" id="status-text"></span>
      <button class="maint-toggle" id="maint-toggle" title="维护模式">维护</button>
      <button class="btn-publish" id="publish-btn">发布</button>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">目录</div>
    <ul class="toc" id="admin-toc"></ul>
  </nav>

  <div class="editor-main" id="editor-main">
    <textarea class="source-editor" id="source-editor" style="display:none;" spellcheck="false" placeholder="在此处粘贴石墨文档内容，或直接编辑 Markdown..."></textarea>
    <div class="rendered-preview" id="rendered-preview" tabindex="0"></div>
  </div>

  <footer class="admin-footer">
    <span id="footer-status">就绪</span>
  </footer>
</div>

<!-- Publish Progress Modal -->
<div class="publish-modal" id="publish-modal" style="display:none;">
  <div class="publish-modal-card">
    <div class="publish-modal-title">发布中</div>
    <div class="publish-modal-steps" id="publish-steps"></div>
    <div class="publish-modal-footer" id="publish-modal-footer" style="display:none;">
      <button class="btn-publish" id="publish-close-btn">关闭</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
<script src="../js/codeberg-api.js?v=10"></script>
<script src="../js/admin.js?v=14"></script>
</body>
</html>
