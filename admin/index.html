<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - The PotPvP Directory</title>
<link rel="icon" type="image/png" href="../favicon.png">
<link rel="stylesheet" href="../css/main.css?v=26">
<link rel="stylesheet" href="../css/admin.css?v=19">
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <div class="login-card">
    <h2>The PotPvP Directory</h2>
    <p>管理后台</p>
    <input type="password" id="token-input" placeholder="GitHub Fine-grained Personal Access Token" autocomplete="off">
    <button id="login-btn">登录</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Editor -->
<div class="editor-screen" id="editor-screen" style="display:none;">
  <header class="admin-topbar">
    <button class="topbar-btn" id="admin-menu-btn" aria-label="目录">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="3" y1="5" x2="17" y2="5"/><line x1="3" y1="10" x2="17" y2="10"/><line x1="3" y1="15" x2="17" y2="15"/>
      </svg>
    </button>
    <span class="admin-title">Admin</span>
    <div class="admin-actions">
      <div class="view-toggle" id="view-toggle"></div>
      <div class="admin-mode-toggle" id="admin-mode-toggle" role="group" aria-label="切换管理模式">
        <button type="button" data-work-mode="preview">预览</button>
        <button type="button" data-work-mode="edit">编辑</button>
      </div>
      <button class="undo-redo-btn" id="undo-btn" title="撤销 Ctrl+Z">&#x21B6;</button>
      <button class="undo-redo-btn" id="redo-btn" title="重做 Ctrl+Y">&#x21B7;</button>
      <span class="status-text" id="status-text"></span>
      <span class="maint-badge" id="admin-maint-badge" hidden>维护中</span>
      <button class="btn-manage" id="manage-btn" type="button">管理</button>
    </div>
  </header>

  <div class="sidebar-overlay" id="sidebar-overlay"></div>
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span>目录</span>
      <div class="toc-depth-control" id="admin-toc-depth-control" role="group" aria-label="目录层级">
        <button type="button" data-toc-depth="1" aria-label="显示一级目录">1</button>
        <button type="button" data-toc-depth="2" aria-label="显示二级目录">2</button>
        <button type="button" data-toc-depth="3" aria-label="显示三级目录">3</button>
      </div>
    </div>
    <label class="toc-track-control">
      <input type="checkbox" id="admin-toc-track-toggle">
      <span>Track</span>
    </label>
    <ul class="toc" id="admin-toc"></ul>
  </nav>

  <div class="editor-main" id="editor-main">
    <textarea class="source-editor" id="source-editor" style="display:none;" spellcheck="false" placeholder="在此处粘贴石墨文档内容，或直接编辑 Markdown..."></textarea>
    <div class="rendered-preview" id="rendered-preview" tabindex="0"></div>
  </div>

  <footer class="admin-footer">
    <span id="footer-status">就绪</span>
  </footer>
</div>

<!-- Manage Modal -->
<div class="admin-modal" id="manage-modal" style="display:none;">
  <div class="admin-modal-card">
    <div class="admin-modal-header">
      <div class="admin-modal-title">管理</div>
      <button class="admin-modal-close" type="button" data-close-modal aria-label="关闭">&times;</button>
    </div>
    <div class="manage-actions">
      <button class="manage-action" type="button" id="add-level-1-btn">
        <span>添加一级片段</span>
        <small>插入 h2 模块</small>
      </button>
      <button class="manage-action" type="button" id="add-level-2-btn">
        <span>添加二级片段</span>
        <small>插入 h3 模块</small>
      </button>
      <button class="manage-action" type="button" id="maint-toggle">
        <span>维护</span>
        <small id="maint-action-desc">开启维护模式</small>
      </button>
      <button class="manage-action primary" type="button" id="publish-btn">
        <span>发布</span>
        <small>上传当前 Markdown</small>
      </button>
    </div>
  </div>
</div>

<!-- Add Module Modal -->
<div class="admin-modal" id="add-module-modal" style="display:none;">
  <form class="admin-modal-card" id="add-module-form">
    <div class="admin-modal-header">
      <div class="admin-modal-title" id="add-module-title">添加片段</div>
      <button class="admin-modal-close" type="button" data-close-modal aria-label="关闭">&times;</button>
    </div>
    <label class="form-field">
      <span>标题</span>
      <input type="text" id="add-module-name" autocomplete="off" required>
    </label>
    <label class="form-field">
      <span>它前面的片段</span>
      <select id="add-module-before"></select>
    </label>
    <label class="form-field">
      <span>它后面的片段</span>
      <select id="add-module-after"></select>
    </label>
    <div class="modal-error" id="add-module-error"></div>
    <div class="admin-modal-footer">
      <button class="modal-secondary" type="button" data-close-modal>取消</button>
      <button class="btn-publish" type="submit">添加</button>
    </div>
  </form>
</div>

<!-- Publish Progress Modal -->
<div class="publish-modal" id="publish-modal" style="display:none;">
  <div class="publish-modal-card">
    <div class="publish-modal-title">发布中</div>
    <div class="publish-modal-progress">
      <div class="publish-progress-meta">
        <span>总进度</span>
        <span class="publish-progress-text" id="publish-progress-text">0 / 0</span>
      </div>
      <div class="publish-progress-track" id="publish-progress-track" role="progressbar" aria-label="发布总进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
        <div class="publish-progress-bar" id="publish-progress-bar"></div>
      </div>
    </div>
    <div class="publish-modal-steps" id="publish-steps"></div>
    <div class="publish-modal-footer" id="publish-modal-footer" style="display:none;">
      <button class="btn-publish" id="publish-close-btn">关闭</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/javascript.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/json.min.js"></script>
<script src="../js/github-api.js?v=2"></script>
<script src="../js/admin.js?v=35"></script>
</body>
</html>
